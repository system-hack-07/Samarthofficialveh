<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Intelligence System</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#050816;
  min-height:100vh;
  overflow-x:hidden;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.matrix{
  position:fixed;
  inset:0;
  background-image:
  radial-gradient(rgba(0,255,255,.12) 1px, transparent 1px);
  background-size:30px 30px;
  opacity:.05;
  z-index:-3;
}

.glow{
  position:fixed;
  width:400px;
  height:400px;
  border-radius:50%;
  filter:blur(120px);
  opacity:.25;
  z-index:-2;
}

.g1{
  background:cyan;
  top:-100px;
  left:-100px;
}

.g2{
  background:violet;
  bottom:-100px;
  right:-100px;
}

.password-screen{
  position:fixed;
  inset:0;
  background:
  linear-gradient(
  135deg,
  #020617,
  #07152f
  );

  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.password-box{
  width:100%;
  max-width:420px;
  padding:40px;
  border-radius:30px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(20px);
  text-align:center;
  animation:float 5s infinite ease-in-out;
  box-shadow:
  0 0 30px rgba(0,255,255,.2);
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

.password-box h1{
  font-size:42px;
  margin-bottom:15px;

  background:
  linear-gradient(
  to right,
  cyan,
  violet
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.password-box p{
  color:rgba(255,255,255,.6);
  margin-bottom:25px;
}

.password-box input{
  width:100%;
  padding:18px;
  border:none;
  outline:none;
  border-radius:18px;
  background:rgba(0,0,0,.4);
  color:white;
  border:1px solid rgba(255,255,255,.1);
  font-size:16px;
}

.password-box button{
  width:100%;
  margin-top:20px;
  padding:18px;
  border:none;
  border-radius:18px;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
  transition:.4s;

  background:
  linear-gradient(
  to right,
  cyan,
  violet
  );
}

.password-box button:hover{
  transform:scale(1.04);
}

.error-text{
  color:#ff7f7f;
  margin-top:15px;
  display:none;
}

.container{
  width:100%;
  max-width:900px;
  display:none;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:30px;
  padding:35px;
  backdrop-filter:blur(20px);
  position:relative;
  overflow:hidden;
}

.scanner-line{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:4px;

  background:
  linear-gradient(
  to right,
  transparent,
  cyan,
  transparent
  );

  animation:scan 4s linear infinite;
}

@keyframes scan{
  from{top:0}
  to{top:100%}
}

.title{
  text-align:center;
  font-size:42px;
  margin-bottom:10px;

  background:
  linear-gradient(
  to right,
  cyan,
  violet
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  text-align:center;
  color:rgba(255,255,255,.6);
  margin-bottom:30px;
}

.search-box{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.search-box input{
  flex:1;
  min-width:220px;
  padding:18px;
  border:none;
  border-radius:18px;
  outline:none;
  background:rgba(0,0,0,.4);
  color:white;
  border:1px solid rgba(255,255,255,.1);
}

.search-box button{
  padding:18px 30px;
  border:none;
  border-radius:18px;
  cursor:pointer;
  font-weight:bold;
  transition:.4s;

  background:
  linear-gradient(
  to right,
  cyan,
  violet
  );
}

.search-box button:hover{
  transform:scale(1.05);
}

.loading{
  display:none;
  margin-top:30px;
  text-align:center;
  color:cyan;
}

.result{
  display:none;
  margin-top:30px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(0,255,255,.15);
}

.info-grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  transition:.4s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:
  0 0 25px cyan;
}

.card span{
  display:block;
  margin-bottom:8px;
  color:rgba(255,255,255,.5);
  font-size:13px;
}

.actions{
  margin-top:25px;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
}

.actions button{
  padding:15px 22px;
  border:none;
  border-radius:16px;
  cursor:pointer;
  font-weight:bold;

  background:
  linear-gradient(
  to right,
  cyan,
  violet
  );
}

.footer{
  text-align:center;
  margin-top:25px;
  color:rgba(255,255,255,.4);
}

.error{
  display:none;
  margin-top:20px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,0,0,.08);
  color:#ff7f7f;
  text-align:center;
}

.voice{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  cursor:pointer;

  background:
  linear-gradient(
  to right,
  cyan,
  violet
  );

  box-shadow:
  0 0 30px cyan;

  animation:voiceFloat 3s infinite;
}

@keyframes voiceFloat{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

</style>
</head>

<body>

<div class="matrix"></div>

<div class="glow g1"></div>
<div class="glow g2"></div>

<!-- SOUNDS -->

<audio id="wrongSound"
src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3">
</audio>

<audio id="correctSound"
src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3">
</audio>

<audio id="scanSound"
src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">
</audio>

<audio id="successSound"
src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3">
</audio>

<!-- PASSWORD -->

<div class="password-screen" id="passwordScreen">

<div class="password-box">

<h1>ACCESS SYSTEM</h1>

<p>
Vehicle Intelligence Database
</p>

<input
type="password"
id="passwordInput"
placeholder="Enter Password">

<button onclick="checkPassword()">
ENTER DATABASE
</button>

<div class="error-text" id="passError">
Incorrect Password
</div>

</div>

</div>

<!-- MAIN -->

<div class="container" id="mainSite">

<div class="scanner-line"></div>

<h1 class="title">
Vehicle Intelligence
</h1>

<p class="subtitle">
Website By Samarth
</p>

<div class="search-box">

<input
type="text"
id="vehicleNumber"
placeholder="Enter Vehicle Number">

<button onclick="searchVehicle()">
SEARCH
</button>

</div>

<div class="loading" id="loading">

<h3>
Scanning Vehicle Database...
</h3>

<p>
Decrypting records...
</p>

</div>

<div class="error" id="error"></div>

<div class="result" id="result">

<h2 style="color:cyan;margin-bottom:20px;">
Vehicle Information
</h2>

<div class="info-grid"
id="infoGrid">
</div>

<div class="actions">

<button onclick="copyData()">
Copy
</button>

<button onclick="shareResult()">
Share
</button>

<button onclick="downloadCard()">
Download
</button>

</div>

</div>

<div class="footer">
© 2026 Vehicle Intelligence By Samarth
</div>

</div>

<!-- VOICE -->

<div class="voice"
onclick="speakMessage()">
🎙️
</div>

<script>

function checkPassword(){

const pass =
document.getElementById(
'passwordInput'
).value;

if(pass === 'siri'){

document.getElementById(
'correctSound'
).play();

document.getElementById(
'passwordScreen'
).style.display='none';

document.getElementById(
'mainSite'
).style.display='block';

}else{

document.getElementById(
'wrongSound'
).play();

document.getElementById(
'passError'
).style.display='block';

navigator.vibrate?.(300);

}

}

async function searchVehicle(){

const vehicleNumber =
document.getElementById(
'vehicleNumber'
).value.trim();

const loading =
document.getElementById(
'loading'
);

const result =
document.getElementById(
'result'
);

const error =
document.getElementById(
'error'
);

const infoGrid =
document.getElementById(
'infoGrid'
);

if(!vehicleNumber){

error.style.display='block';

error.innerText=
'Enter vehicle number';

return;

}

loading.style.display='block';

result.style.display='none';

error.style.display='none';

infoGrid.innerHTML='';

document.getElementById(
'scanSound'
).play();

try{

const apiUrl =
'https://api-by-Black-Hats-Hackers.kesug.com/vehicle-api.php?vehicle_no='
+ encodeURIComponent(vehicleNumber);

const response =
await fetch(apiUrl);

const data =
await response.json();

loading.style.display='none';

if(!data){

error.style.display='block';

error.innerText=
'No data found';

return;

}

result.style.display='block';

for(const key in data){

const card =
document.createElement('div');

card.className='card';

card.innerHTML=`

<span>
${key.toUpperCase()}
</span>

<p>
${data[key]}
</p>

`;

infoGrid.appendChild(card);

}

document.getElementById(
'successSound'
).play();

navigator.vibrate?.(150);

}catch(e){

loading.style.display='none';

error.style.display='block';

error.innerText=
'Failed to fetch vehicle data';

}

}

function copyData(){

navigator.clipboard.writeText(
document.getElementById(
'infoGrid'
).innerText
);

alert('Copied');

}

function shareResult(){

if(navigator.share){

navigator.share({

title:
'Vehicle Intelligence',

text:
'Vehicle lookup website by Samarth'

});

}else{

alert('Sharing not supported');

}

}

function downloadCard(){

window.print();

}

function speakMessage(){

const speech =
new SpeechSynthesisUtterance(

'Welcome to Samarth vehicle intelligence system'

);

speech.lang='en-US';

speechSynthesis.speak(speech);

}

</script>

</body>
  </html>
