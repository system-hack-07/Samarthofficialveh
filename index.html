<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Intelligence By Samarth</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#050816;
  min-height:100vh;
  color:white;
  overflow-x:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.password-screen{
  position:fixed;
  inset:0;
  background:
  linear-gradient(135deg,#020617,#07152f);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.password-box{
  width:100%;
  max-width:420px;
  padding:40px;
  border-radius:30px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(20px);
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,255,.2);
}

.password-box h1{
  font-size:42px;
  margin-bottom:15px;
  background:linear-gradient(to right,cyan,violet);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.password-box p{
  color:rgba(255,255,255,.6);
  margin-bottom:25px;
}

.password-box input{
  width:100%;
  padding:18px;
  border:none;
  outline:none;
  border-radius:18px;
  background:rgba(0,0,0,.4);
  color:white;
  border:1px solid rgba(255,255,255,.1);
}

.password-box button{
  width:100%;
  margin-top:20px;
  padding:18px;
  border:none;
  border-radius:18px;
  cursor:pointer;
  font-weight:bold;
  background:
  linear-gradient(to right,cyan,violet);
}

.error-text{
  display:none;
  color:#ff7f7f;
  margin-top:15px;
}

.container{
  width:100%;
  max-width:900px;
  display:none;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:30px;
  padding:35px;
  backdrop-filter:blur(20px);
}

.title{
  text-align:center;
  font-size:42px;
  margin-bottom:10px;

  background:
  linear-gradient(to right,cyan,violet);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  text-align:center;
  color:rgba(255,255,255,.6);
  margin-bottom:30px;
}

.search-box{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.search-box input{
  flex:1;
  min-width:220px;
  padding:18px;
  border:none;
  outline:none;
  border-radius:18px;
  background:rgba(0,0,0,.4);
  color:white;
  border:1px solid rgba(255,255,255,.1);
}

.search-box button{
  padding:18px 30px;
  border:none;
  border-radius:18px;
  cursor:pointer;
  font-weight:bold;
  background:
  linear-gradient(to right,cyan,violet);
}

.loading{
  display:none;
  margin-top:30px;
  text-align:center;
  color:cyan;
}

.error{
  display:none;
  margin-top:20px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,0,0,.08);
  color:#ff7f7f;
  text-align:center;
}

.result{
  display:none;
  margin-top:30px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(0,255,255,.15);
}

.info-grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
}

.card span{
  display:block;
  margin-bottom:8px;
  color:rgba(255,255,255,.5);
  font-size:13px;
}

.footer{
  text-align:center;
  margin-top:25px;
  color:rgba(255,255,255,.4);
}

</style>
</head>

<body>

<!-- SOUNDS -->

<audio id="wrongSound"
src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3">
</audio>

<audio id="correctSound"
src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3">
</audio>

<audio id="scanSound"
src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">
</audio>

<audio id="successSound"
src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3">
</audio>

<!-- PASSWORD -->

<div class="password-screen"
id="passwordScreen">

<div class="password-box">

<h1>ACCESS SYSTEM</h1>

<p>
Vehicle Intelligence Database
</p>

<input
type="password"
id="passwordInput"
placeholder="Enter Password">

<button onclick="checkPassword()">
ENTER DATABASE
</button>

<div class="error-text"
id="passError">

Incorrect Password

</div>

</div>

</div>

<!-- MAIN -->

<div class="container"
id="mainSite">

<h1 class="title">
Vehicle Intelligence
</h1>

<p class="subtitle">
Website By Samarth
</p>

<div class="search-box">

<input
type="text"
id="vehicleNumber"
placeholder="Enter Vehicle Number">

<button onclick="searchVehicle()">
SEARCH
</button>

</div>

<div class="loading"
id="loading">

<h3>
Scanning Vehicle Database...
</h3>

</div>

<div class="error"
id="error">
</div>

<div class="result"
id="result">

<h2 style="color:cyan;margin-bottom:20px;">
Vehicle Information
</h2>

<div class="info-grid"
id="infoGrid">
</div>

</div>

<div class="footer">
© 2026 Vehicle Intelligence By Samarth
</div>

</div>

<script>

function checkPassword(){

const pass =
document.getElementById(
'passwordInput'
).value;

if(pass === 'siri'){

document.getElementById(
'correctSound'
).play();

document.getElementById(
'passwordScreen'
).style.display='none';

document.getElementById(
'mainSite'
).style.display='block';

}else{

document.getElementById(
'wrongSound'
).play();

document.getElementById(
'passError'
).style.display='block';

}

}

async function searchVehicle(){

const vehicleNumber =
document.getElementById(
'vehicleNumber'
).value.trim();

const loading =
document.getElementById(
'loading'
);

const result =
document.getElementById(
'result'
);

const error =
document.getElementById(
'error'
);

const infoGrid =
document.getElementById(
'infoGrid'
);

if(!vehicleNumber){

error.style.display='block';

error.innerText=
'Enter vehicle number';

return;

}

loading.style.display='block';

result.style.display='none';

error.style.display='none';

infoGrid.innerHTML='';

document.getElementById(
'scanSound'
).play();

try{

const apiUrl =
'https://api-by-Black-Hats-Hackers.kesug.com/vehicle-api.php?vehicle_no='
+ encodeURIComponent(vehicleNumber);

const response =
await fetch(apiUrl,{
  mode:'no-cors'
});

loading.style.display='none';

document.getElementById(
'successSound'
).play();

result.style.display='block';

const card =
document.createElement('div');

card.className='card';

card.innerHTML=`

<span>
STATUS
</span>

<p>
Request Sent Successfully
</p>

`;

infoGrid.appendChild(card);

}catch(e){

loading.style.display='none';

error.style.display='block';

error.innerText=
'Failed to fetch vehicle data';

console.log(e);

}

}

</script>

</body>
  </html>
